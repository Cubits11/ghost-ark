name: infra-plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/terraform/bootstrap init -backend=false
      - run: terraform -chdir=infra/terraform/bootstrap validate
      - run: terraform -chdir=infra/terraform/bootstrap plan -input=false -lock=false

  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx cdk synth --app "node dist/infra/cdk/bin/app.js"
