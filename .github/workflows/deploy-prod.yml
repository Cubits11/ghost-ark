name: deploy-prod

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      GHOST_ARK_ORCHESTRATION_GLUE_CRAWLER_ARNS: ${{ vars.GHOST_ARK_ORCHESTRATION_GLUE_CRAWLER_ARNS }}
      GHOST_ARK_ORCHESTRATION_ATHENA_WORKGROUP_ARNS: ${{ vars.GHOST_ARK_ORCHESTRATION_ATHENA_WORKGROUP_ARNS }}
      GHOST_ARK_ORCHESTRATION_LAMBDA_FUNCTION_ARNS: ${{ vars.GHOST_ARK_ORCHESTRATION_LAMBDA_FUNCTION_ARNS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      - run: npx cdk synth --app "node dist/infra/cdk/bin/app.js" -c stage=prod
      - run: npx cdk deploy --app "node dist/infra/cdk/bin/app.js" --all -c stage=prod --require-approval never
