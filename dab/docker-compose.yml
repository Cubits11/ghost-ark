version: '3.8'

services:
  agent-runtime:
    build: 
      context: ./agent
    # EXP 1: Agent has NO external network routes (eBPF / kernel namespace drops)
    network_mode: none
    volumes:
      - uds_ipc:/ipc
    depends_on:
      - dab-gateway

  dab-gateway:
    build: 
      context: ./dab-gateway
    network_mode: bridge
    volumes:
      - uds_ipc:/ipc
    environment:
      - KMS_DEV_PRIVATE_KEY=/keys/gateway.pem

volumes:
  uds_ipc: